<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的图像识别模型</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
      background: #f8f9fa;
      margin: 0;
    }
    h1 { color: #333; margin-bottom: 10px; }
    p { color: #666; }
    button {
      padding: 12px 24px;
      margin: 10px;
      font-size: 18px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
    }
    button.start { background: #28a745; color: white; }
    button.upload { background: #007bff; color: white; }
    #webcam-container { margin: 20px auto; }
    #image-preview {
      max-width: 320px;
      margin: 15px auto;
      border: 3px solid #007bff;
      border-radius: 10px;
      display: none;
    }
    #label-container div {
      font-size: 20px;
      margin: 8px auto;
      padding: 10px;
      background: white;
      border-radius: 8px;
      max-width: 400px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    input[type="file"] { display: none; }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
  <h1>我的图像识别模型</h1>
  <p>支持摄像头实时识别 + 上传图片识别</p>

  <button class="start" type="button" onclick="init()">🚀 启动摄像头</button>
  <button class="upload" type="button" onclick="document.getElementById('fileInput').click()">
    📤 上传图片
  </button>

  <input type="file" id="fileInput" accept="image/*" onchange="handleImageUpload(event)" />

  <div id="webcam-container"></div>
  
  <img id="image-preview" alt="预览图片" />

  <div id="label-container"></div>

  <script type="text/javascript">
    const URL = "./";   // 重要：模型文件在当前文件夹

    let model, webcam, labelContainer, maxPredictions;
    let currentImageElement = null;

    // 加载模型
    async function loadModel() {
      const modelURL = URL + "model.json";
      const metadataURL = URL + "metadata.json";
      model = await tmImage.load(modelURL, metadataURL);
      maxPredictions = model.getTotalClasses();
      
      labelContainer = document.getElementById("label-container");
      for (let i = 0; i < maxPredictions; i++) {
        const div = document.createElement("div");
        labelContainer.appendChild(div);
      }
    }

    // 启动摄像头
    async function init() {
      if (!model) await loadModel();

      const flip = true;
      webcam = new tmImage.Webcam(300, 300, flip);
      await webcam.setup();
      await webcam.play();
      window.requestAnimationFrame(loop);

      document.getElementById("webcam-container").appendChild(webcam.canvas);
      document.getElementById("image-preview").style.display = "none"; // 隐藏图片预览
    }

    async function loop() {
      webcam.update();
      await predictWebcam();
      window.requestAnimationFrame(loop);
    }

    // 摄像头预测
    async function predictWebcam() {
      if (!model || !webcam) return;
      const prediction = await model.predict(webcam.canvas);
      showPrediction(prediction);
    }

    // 上传图片处理
    async function handleImageUpload(event) {
      if (!model) await loadModel();

      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = async function(e) {
        const img = document.getElementById("image-preview");
        img.src = e.target.result;
        img.style.display = "block";

        // 隐藏摄像头画面
        if (webcam) {
          webcam.stop();
          document.getElementById("webcam-container").innerHTML = "";
        }

        // 等待图片加载完成后再预测
        img.onload = async function() {
          const prediction = await model.predict(img);
          showPrediction(prediction);
        };
      };
      reader.readAsDataURL(file);
    }

    // 显示预测结果
    function showPrediction(prediction) {
      for (let i = 0; i < maxPredictions; i++) {
        const classPrediction = 
          prediction[i].className + ": " + prediction[i].probability.toFixed(2);
        labelContainer.childNodes[i].innerHTML = classPrediction;
      }
    }
  </script>
</body>
</html>
